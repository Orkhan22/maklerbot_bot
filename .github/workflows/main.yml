name: Bina AZ Bot

on:
  schedule:
    - cron: '*/15 * * * *' # H…ôr 15 d…ôqiq…ôd…ôn bir iŇül…ôyir
  workflow_dispatch: # LazńĪm olanda √∂z√ľn d…ô d√ľym…ô il…ô iŇül…ôd…ô bil…ôs…ôn

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu kopyala
        uses: actions/checkout@v3

      - name: Python-u quraŇüdńĪr
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: KitabxanalarńĪ y√ľkl…ô
        run: pip install -r requirements.txt

      - name: Botu iŇü…ô sal
        run: python main.py

      - name: D…ôyiŇüiklikl…ôri yadda saxla
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add seen_ids.txt
          git commit -m "Update seen IDs" || exit 0
          git push
