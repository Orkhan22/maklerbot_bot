  workflow_dispatch: # D眉ym蓹 d蓹 qals谋n ki, ist蓹y蓹nd蓹 枚z眉n d蓹 basasan

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu g枚t眉r
        uses: actions/checkout@v3

      - name: Python qura艧d谋r
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kitabxanalar谋 y眉kl蓹
        run: pip install requests beautifulsoup4

      - name: Botu i艧l蓹t
        run: python main
